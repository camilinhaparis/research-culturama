<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="culturama-favico.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Research Culturama</title>
</head>
<body>
    <main>
        <header>
            <img src="img/logo-culturama.png" alt="logo culturama">
            <h1>Opinion survey</h1>
        </header>
        <section>
            <form action="success.html" method="get">            
                <fieldset>
                    <legend>Personal Data</legend>            
                    <label for="name">Name:</label>
                    <input  id="name"  type="text" name="userName" required>
                    <br>
                    <label for="age">Age: </label>
                    <input id="age" type="number" name="useAge" min="12" max="100" required>
                    <br>
                    <label for="birthDate"> Date of Birth</label>
                    <input id="birthDate" type="date" name="userBirthdate">
                    <br>
                    <label for="email"> Email: </label>
                    <input id="email" type="email" name="userEmail" required>
                    <br>            
                    <label for="phoneNumber"> Phone: </label>
                    <input id="phoneNumber" type="tel" name="userPhoneNumber" pattern="[0-9]{11}" placeholder="DDD + number" aria-describedby="phoneHelp">
                    <small id="phoneHelp">Enter 11 digits in the format: area code + number, without spaces or symbols.</small>
                    <br>
                    <label for="image"> Upload of image: </label>
                    <input id="image" type="file" accept="image/*" name="userPhoto" aria-describedby="imageHelp">
                    <small id="imageHelp">Upload a photo in PNG or JPEG format</small>
                    <br>
                </fieldset> 
                <fieldset>
                    <legend>Profile</legend>
                    <p>Sex:</p>
                    <input id="fem" type="radio" name="userGender" value="Female">
                    <label for="fem">Female</label>

                    <input id="male" type="radio" name="userGender" value="Male">
                    <label for="male">Male</label>

                    <input id="notInformed" type="radio" name="userGender" value="notInformed">
                    <label for="notInformed">Not Informed</label>
                    <br>

                    <label for="maritalStatus">Marital Status</label>
                    <select id="maritalStatus" name="userMaritalStatus">
                        <option value="notInformed">Selection...</option>
                        <option value="married">Married</option>
                        <option value="single">Single</option>
                        <option value="divorced">Divorced</option>
                        <option value="married">Registered Partnership</option>
                        <option value="widowed">Widowed</option>
                    </select>

                    <label for="city">City</label>
                    <input type="text" id="city" name="userCity" autocomplete="address-level2" placeholder="Ex.: Fortaleza">

                    <label for="state">State</label>
                        <select id="state" name="userState" required>
                            <option value="acre">Acre</option>
                            <option value="alagoas">Alagoas</option>
                            <option value="amapa">Amapá</option>
                            <option value="amazonas">Amazonas</option>
                            <option value="bahia">Bahia</option>
                            <option value="ceara">Ceará</option>
                            <option value="distritoFederal">Distrito Federal</option> 
                            <option value="espiritoSanto">Espirito Santo</option> 
                            <option value="goias">Goiás</option>
                            <option value="maranhao">Maranhão</option>
                            <option value="matoGrossoDoSul">Mato Grosso do Sul</option> 
                            <option value="matoGrosso">Mato Grosso</option> 
                            <option value="minasGerais">Minas Gerais</option> 
                            <option value="para">Pará</option>
                            <option value="paraiba">Paraíba</option>
                            <option value="parana">Paraná</option>
                            <option value="pernambuco">Pernambuco</option>
                            <option value="piaui">Piauí</option>
                            <option value="rioDeJaneiro">Rio de Janeiro</option> 
                            <option value="rioGrandeDoNorte">Rio Grande do Norte</option> 
                            <option value="rioGrandeDoSul">Rio Grande do Sul</option> 
                            <option value="rondonia">Rondônia</option>
                            <option value="roraima">Roraima</option>
                            <option value="santaCatarina">Santa Catarina</option> 
                            <option value="saoPaulo">São Paulo</option> 
                            <option value="sergipe">Sergipe</option>
                            <option value="tocantins">Tocantins</option>
                    </select>
                </fieldset>

                <fieldset>
                    <legend>Habits</legend>
                    <p>Social Midia</p>
                    <input id="instagram" type="checkbox" name="social" value="instagram">
                    <label for="instagram">Instragram</label>
                    <br>
                    <input id="facebook" type="checkbox" name="social" value="facebook">
                    <label for="facebook">Facebook</label>
                    <br>
                    <input id="linkedin" type="checkbox" name="social" value="linkedin">
                    <label for="linkedin">Linkedin</label>
                    <br>
                    <input id="x" type="checkbox" name="social" value="x">
                    <label for="x">X</label>
                    <br>
                    <label for="musicStyle">Style Music</label>
                    <input list="styleTypes" id="musicStyle" name="userMusicStyle" type="text">
                    <datalist id="styleTypes">
                        <option value="Rock">
                        <option value="Pop">
                        <option value="Samba">
                        <option value="Sertanejo">
                    </datalist>
                    <br>
                    <label for="favoriteColor">Favorite Color</label>
                    <input type="color" name="userFavoriteColor" id="favoriteColor">
                </fieldset>

                <fieldset>
                    <legend>Opinion</legend>
                    <p>What do you think about the quality of our service?</p>

                    <input id="excellent" type="radio" name="userSatisfaction" value="userExcellent">
                    <label for="excellent">Excellent</label><br>

                    <input id="good" type="radio" name="userSatisfaction" value="userGood">
                    <label for="good">Good</label><br>

                    <input id="average" type="radio" name="userSatisfaction" value="userAverage">
                    <label for="average">Average</label><br>

                    <input id="bad" type="radio" name="userSatisfaction" value="userBad">
                    <label for="bad">Bad</label><br>
                    <br>
                    <label for="comment">Leave your comment:</label><br>
                    <textarea id="comment" name="userComment" rows="4" cols="50" placeholder="write your opnion here..."></textarea>
                </fieldset>
                <fieldset>
                    <legend>Confirmation</legend>
                    <input type="checkbox" name="Lgpd" id="termLgpd" value="accepted" required>
                    <label for="termLgpd">I agree to participate in the research.</label><br>

                    <input type="checkbox" name="userGetResult" id="getResult" value="accepted" >
                    <label for="getResult">I wish to receive the result by email.</label><br>
                </fieldset>

                <button type="submit" aria-label="Submit form data">Send</button>
                <button type="reset" aria-label="Clear form data">Reset</button>
            </form>
        </section>
    </main>    
</body>
</html>
