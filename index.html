<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Culturama</title>
</head>
<body>
    <header>
        <h1>Online Research</h1>
    </header>
    <section>
        <form action="" method="get">
            <fieldset>
                <legend>Personal Data</legend>
                <!--DADOS PESSOAIS-->
                <label for="userName">Name:</label>
                <input type="text" name="userName" required>
                <br>
                <label for="userAge">Age: </label>
                <input type="number" name="useAge" min="12" max="100" required>
                <br>
                <label for="birthDate"> Date of Birth</label>
                <input type="date" name="date">
                <br>
                <label for="userEmail"> Email: </label>
                <input type="email" name="userEmail" required>
                <br>            
                <label for="userPhoneNumber"> Phone: </label>
                <input type="tel" name="userPhoneNumber" pattern="[0-9]{11}" placeholder="DDD + number">
                <br>
                <label for="userImage"> Upload of image: </label>
                <input type="file" accept="image/*" name="userPhoto" required>
                <br>
            </fieldset>
            

            <button type="submit">Enviar</button>
        </form>
    </section>
    
</body>
</html>
